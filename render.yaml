services:
  - type: web
    name: rec-engine-api
    runtime: python
    plan: free
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TOP_K
        value: "20"
      - key: RERANK_K
        value: "10"
    healthCheckPath: /health
